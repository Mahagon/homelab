apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: jellyfin
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: jellyfin
  updatePolicy:
    updateMode: InPlaceOrRecreate
  resourcePolicy:
    containerPolicies:
      # Only let the VPA tune requests; keep the statically-defined 4Gi memory
      # limit so bursty transcodes aren't OOM-killed when the pod is idle.
      - containerName: jellyfin
        controlledValues: RequestsOnly
