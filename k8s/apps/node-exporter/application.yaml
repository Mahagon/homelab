apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: node-exporter
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: prometheus-node-exporter
      targetRevision: 4.52.2
      helm:
        values: |
          podAnnotations:
            prometheus.io/scrape: "true"
            prometheus.io/port: "9100"
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
    - repoURL: git@github.com:Mahagon/homelab.git
      targetRevision: main
      path: k8s/apps/node-exporter/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
