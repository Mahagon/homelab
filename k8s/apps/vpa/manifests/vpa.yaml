apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: vpa-admission-controller
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: vpa-vertical-pod-autoscaler-admission-controller
  resourcePolicy:
    containerPolicies:
      - containerName: '*'
        minAllowed:
          memory: 16Mi
        maxAllowed:
          memory: 48Mi
  updatePolicy:
    updateMode: Initial
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: vpa-recommender
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: vpa-vertical-pod-autoscaler-recommender
  resourcePolicy:
    containerPolicies:
      - containerName: '*'
        minAllowed:
          memory: 24Mi
        maxAllowed:
          memory: 64Mi
  updatePolicy:
    updateMode: Initial
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: vpa-updater
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: vpa-vertical-pod-autoscaler-updater
  resourcePolicy:
    containerPolicies:
      - containerName: '*'
        minAllowed:
          memory: 20Mi
        maxAllowed:
          memory: 48Mi
  updatePolicy:
    updateMode: Initial
