apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vpa
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: default
  sources:
    - repoURL: https://cowboysysop.github.io/charts
      chart: vertical-pod-autoscaler
      targetRevision: 11.1.1
      helm:
        values: |
          admissionController:
            revisionHistoryLimit: 0
            resources:
              requests:
                cpu: 50m
                memory: 48Mi
              limits:
                memory: 48Mi
            extraArgs:
              feature-gates: InPlaceOrRecreate=true
          recommender:
            revisionHistoryLimit: 0
            resources:
              requests:
                cpu: 50m
                memory: 48Mi
              limits:
                memory: 48Mi
            extraArgs:
              humanize-memory: "true"
          updater:
            revisionHistoryLimit: 0
            resources:
              requests:
                cpu: 50m
                memory: 48Mi
              limits:
                memory: 48Mi
            extraArgs:
              feature-gates: InPlaceOrRecreate=true
    - repoURL: git@github.com:Mahagon/homelab.git
      targetRevision: main
      path: k8s/apps/vpa/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: vpa
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
