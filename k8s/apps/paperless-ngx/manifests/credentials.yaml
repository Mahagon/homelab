apiVersion: v1
kind: Secret
metadata:
  name: paperless-secrets
  namespace: paperless
  annotations:
    # PAPERLESS_SECRET_KEY and admin credentials are auto-generated.
    # PAPERLESS_DBPASS comes from postgresql-credentials replicated by kubernetes-replicator.
    secret-generator.v1.mittwald.de/autogenerate: "PAPERLESS_SECRET_KEY,PAPERLESS_ADMIN_PASSWORD"
    secret-generator.v1.mittwald.de/encoding: "hex"
    secret-generator.v1.mittwald.de/length: "32"
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  PAPERLESS_ADMIN_USER: "admin"
  PAPERLESS_TOKEN: "REPLACE_AFTER_FIRST_LOGIN"
  OPENAI_API_KEY: "REPLACE_WITH_YOUR_OPENAI_KEY"
