apiVersion: v1
kind: Secret
metadata:
  name: paperless-credentials
  namespace: paperless
  annotations:
    secret-generator.v1.mittwald.de/autogenerate: "SECRET_KEY"
    secret-generator.v1.mittwald.de/encoding: "base64url"
    secret-generator.v1.mittwald.de/length: "50"
    helm.sh/resource-policy: keep
type: Opaque
