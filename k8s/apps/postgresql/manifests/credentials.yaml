apiVersion: v1
kind: Secret
metadata:
  name: postgresql-credentials
  namespace: postgresql
  annotations:
    # password: homelab superuser — replicated to app namespaces by kubernetes-replicator
    secret-generator.v1.mittwald.de/autogenerate: "password"
    secret-generator.v1.mittwald.de/encoding: "base64url"
    secret-generator.v1.mittwald.de/length: "32"
    helm.sh/resource-policy: keep
    replicator.v1.mittwald.de/replication-allowed: "true"
    replicator.v1.mittwald.de/replicate-to: "paperless,home-assistant,vaultwarden"
type: Opaque
