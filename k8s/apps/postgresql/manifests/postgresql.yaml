apiVersion: v1
kind: ConfigMap
metadata:
  name: postgresql-initdb
  namespace: postgresql
  annotations:
    argocd.argoproj.io/sync-wave: "0"
data:
  create-databases.sql: |
    CREATE DATABASE paperless;
    CREATE DATABASE homeassistant;
    CREATE DATABASE vaultwarden;
    GRANT ALL PRIVILEGES ON DATABASE paperless TO homelab;
    GRANT ALL PRIVILEGES ON DATABASE homeassistant TO homelab;
    GRANT ALL PRIVILEGES ON DATABASE vaultwarden TO homelab;
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgresql-config
  namespace: postgresql
  annotations:
    argocd.argoproj.io/sync-wave: "0"
data:
  postgresql.conf: |
    shared_buffers = 64MB
    effective_cache_size = 192MB
    work_mem = 4MB
    max_connections = 50
    listen_addresses = '*'
---
apiVersion: v1
kind: Service
metadata:
  name: postgresql
  namespace: postgresql
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  selector:
    app: postgresql
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgresql
  namespace: postgresql
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  serviceName: postgresql
  replicas: 0
  selector:
    matchLabels:
      app: postgresql
  template:
    metadata:
      labels:
        app: postgresql
    spec:
      containers:
        - name: postgresql
          image: postgres:18.3-alpine3.23@sha256:4da1a4828be12604092fa55311276f08f9224a74a62dcb4708bd7439e2a03911
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: homelab
            - name: POSTGRES_DB
              value: homelab
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql-credentials
                  key: password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: initdb
              mountPath: /docker-entrypoint-initdb.d
            - name: config
              mountPath: /etc/postgresql/postgresql.conf
              subPath: postgresql.conf
          args:
            - -c
            - config_file=/etc/postgresql/postgresql.conf
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - homelab
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: initdb
          configMap:
            name: postgresql-initdb
        - name: config
          configMap:
            name: postgresql-config
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: local-path-ssd
        resources:
          requests:
            storage: 20Gi
