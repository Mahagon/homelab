# K3s includes Traefik by default.
# This adds a default HTTPS redirect middleware.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik-config
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:Mahagon/homelab.git
    targetRevision: main
    path: k8s/apps/traefik/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
