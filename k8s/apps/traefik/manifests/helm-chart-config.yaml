# Customize the K3s-managed Traefik instance.
# K3s watches HelmChartConfig resources in kube-system and merges
# these values into its own Traefik Helm release automatically.
apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: traefik
  namespace: kube-system
spec:
  valuesContent: |-
    deployment:
      podAnnotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9100"
    metrics:
      prometheus:
        entryPoint: metrics
    ports:
      metrics:
        port: 9100
        expose:
          default: false
      web:
        port: 8000
        exposedPort: 80
        redirectTo:
          port: websecure
      websecure:
        port: 8443
        exposedPort: 443
        tls:
          enabled: true
    service:
      annotations:
        external-dns.alpha.kubernetes.io/hostname: traefik.danieljacobs.de
    providers:
      kubernetesIngress:
        publishedService:
          enabled: true
        allowCrossNamespaceSecrets: true
