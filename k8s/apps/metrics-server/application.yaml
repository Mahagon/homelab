apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: metrics-server-config
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:Mahagon/homelab.git
    targetRevision: main
    path: k8s/apps/metrics-server/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
