apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: ingress-route-argocd-server
  namespace: argocd
  annotations:
    external-dns.alpha.kubernetes.io/target: argocd.${DOMAIN}
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`argocd.${DOMAIN}`)
      services:
        - name: argocd-server
          port: 80
    - kind: Rule
      match: Host(`argocd.${DOMAIN}`) && Header(`Content-Type`, `application/grpc`)
      services:
        - name: argocd-server
          port: 80
          scheme: h2c
  tls:
    secretName: argocd-server-tls
