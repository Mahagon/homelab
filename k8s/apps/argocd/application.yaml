apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://argoproj.github.io/argo-helm
      chart: argo-cd
      targetRevision: 9.4.15
      helm:
        values: |
          configs:
            cm:
              dex.config: |
                connectors:
                  - type: github
                    id: github
                    name: GitHub
                    config:
                      clientID: $dex.github.clientID
                      clientSecret: $dex.github.clientSecret
                      redirectURI: https://argocd.${DOMAIN}/api/dex/callback
            rbac:
              policy.csv: |
                g, ${EMAIL}, role:admin
              scopes: "[groups, email]"
            params:
              server.insecure: true
          notifications:
            enabled: false
          server:
            ingress:
              enabled: false
            certificate:
              enabled: true
              issuer:
                kind: ClusterIssuer
                name: letsencrypt-prod
          repoServer:
            volumes:
              - name: cmp-envsubst-config
                configMap:
                  name: argocd-cmp-envsubst
              - name: cmp-envsubst-apps-config
                configMap:
                  name: argocd-cmp-envsubst-apps
            extraContainers:
              - name: cmp-envsubst
                image: quay.io/argoproj/argocd:latest
                command: [/var/run/argocd/argocd-cmp-server]
                env:
                  - name: DOMAIN
                    valueFrom:
                      secretKeyRef:
                        name: homelab-config
                        key: domain
                  - name: EMAIL
                    valueFrom:
                      secretKeyRef:
                        name: homelab-config
                        key: email
                volumeMounts:
                  - mountPath: /var/run/argocd
                    name: var-files
                  - mountPath: /home/argocd/cmp-server/plugins
                    name: plugins
                  - mountPath: /tmp
                    name: tmp
                  - mountPath: /home/argocd/cmp-server/config/plugin.yaml
                    subPath: plugin.yaml
                    name: cmp-envsubst-config
                securityContext:
                  runAsNonRoot: true
                  runAsUser: 999
              - name: cmp-envsubst-apps
                image: quay.io/argoproj/argocd:latest
                command: [/var/run/argocd/argocd-cmp-server]
                env:
                  - name: DOMAIN
                    valueFrom:
                      secretKeyRef:
                        name: homelab-config
                        key: domain
                  - name: EMAIL
                    valueFrom:
                      secretKeyRef:
                        name: homelab-config
                        key: email
                volumeMounts:
                  - mountPath: /var/run/argocd
                    name: var-files
                  - mountPath: /home/argocd/cmp-server/plugins
                    name: plugins
                  - mountPath: /tmp
                    name: tmp
                  - mountPath: /home/argocd/cmp-server/config/plugin.yaml
                    subPath: plugin.yaml
                    name: cmp-envsubst-apps-config
                securityContext:
                  runAsNonRoot: true
                  runAsUser: 999
    # Additional manifests (IngressRoute, etc.)
    - repoURL: git@github.com:Mahagon/homelab.git
      targetRevision: main
      path: k8s/apps/argocd/manifests
      plugin:
        name: envsubst
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
