apiVersion: v1
kind: Secret
metadata:
  name: restic-credentials
  namespace: backup
  annotations:
    secret-generator.v1.mittwald.de/autogenerate: "password"
    secret-generator.v1.mittwald.de/encoding: "base64url"
    secret-generator.v1.mittwald.de/length: "32"
    helm.sh/resource-policy: keep
type: Opaque
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: homelab-backup
  namespace: backup
spec:
  # Mon-Sat at 01:00 - skip Sunday to avoid conflicts with Zincati update window (Sun 03:00-05:00)
  schedule: "0 1 * * 1-6"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          initContainers:
            # Dump PostgreSQL before restic backup
            - name: pg-dump
              image: postgres:18-alpine
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -eu
                  echo "==> Dumping PostgreSQL databases..."
                  PGPASSWORD="$PG_PASSWORD" pg_dumpall \
                    -h postgresql.postgresql.svc.cluster.local \
                    -U homelab \
                    > /pgdump/dump.sql
                  echo "    Done: $(du -sh /pgdump/dump.sql | cut -f1)"
              env:
                - name: PG_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: postgresql-credentials
                      key: password
              volumeMounts:
                - name: pgdump
                  mountPath: /pgdump
          containers:
            - name: restic
              image: restic/restic:latest
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -eu

                  export RESTIC_REPOSITORY=/backup/restic-repo
                  export RESTIC_PASSWORD="$RESTIC_PASSWORD"

                  # Initialise repo on first run
                  if ! restic snapshots &>/dev/null; then
                    echo "==> Initialising restic repository..."
                    restic init
                  fi

                  echo "==> Backing up SSD PVCs (config/data volumes)..."
                  restic backup /data/ssd --tag pvcs-ssd

                  echo "==> Backing up HDD PVCs (media volumes)..."
                  restic backup /data/hdd --tag pvcs-hdd

                  echo "==> Backing up PostgreSQL dump..."
                  restic backup /pgdump --tag postgresql

                  echo "==> Pruning old snapshots..."
                  restic forget \
                    --tag pvcs-ssd --tag pvcs-hdd --tag postgresql \
                    --keep-daily 7 \
                    --keep-weekly 4 \
                    --keep-monthly 6 \
                    --prune

                  echo "==> Backup complete."
                  restic snapshots
              env:
                - name: RESTIC_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: restic-credentials
                      key: password
              volumeMounts:
                - name: backup
                  mountPath: /backup
                - name: pvc-ssd
                  mountPath: /data/ssd
                  readOnly: true
                - name: pvc-hdd
                  mountPath: /data/hdd
                  readOnly: true
                - name: pgdump
                  mountPath: /pgdump
                  readOnly: true
          volumes:
            - name: backup
              hostPath:
                path: /var/mnt/backup
                type: Directory
            - name: pvc-ssd
              hostPath:
                path: /var/lib/homelab
                type: Directory
            - name: pvc-hdd
              hostPath:
                path: /var/mnt/data
                type: Directory
            - name: pgdump
              emptyDir: {}
