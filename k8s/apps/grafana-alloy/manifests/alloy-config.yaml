apiVersion: v1
kind: ConfigMap
metadata:
  name: alloy-config
  namespace: grafana-alloy
data:
  config.alloy: |
    // ============================================================
    // Grafana Cloud credentials (from grafana-cloud-credentials secret)
    // ============================================================

    remote.kubernetes.secret "grafana_cloud" {
      name      = "grafana-cloud-credentials"
      namespace = "grafana-alloy"
    }

    // ============================================================
    // Metrics: Kubernetes discovery and scraping
    // ============================================================

    discovery.kubernetes "nodes" {
      role = "node"
    }

    discovery.kubernetes "pods" {
      role = "pod"
    }

    // --- Kubelet metrics ---
    discovery.relabel "kubelet" {
      targets = discovery.kubernetes.nodes.targets

      rule {
        action        = "replace"
        target_label  = "__address__"
        replacement   = "kubernetes.default.svc:443"
      }
      rule {
        source_labels = ["__meta_kubernetes_node_name"]
        regex         = "(.+)"
        target_label  = "__metrics_path__"
        replacement   = "/api/v1/nodes/${1}/proxy/metrics"
      }
    }

    prometheus.scrape "kubelet" {
      targets         = discovery.relabel.kubelet.output
      job_name        = "integrations/kubernetes/kubelet"
      scheme          = "https"
      scrape_interval = "60s"
      bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
      tls_config {
        ca_file              = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
        insecure_skip_verify = false
      }
      forward_to = [prometheus.relabel.drop_high_cardinality.receiver]
    }

    // --- cAdvisor metrics ---
    discovery.relabel "cadvisor" {
      targets = discovery.kubernetes.nodes.targets

      rule {
        action        = "replace"
        target_label  = "__address__"
        replacement   = "kubernetes.default.svc:443"
      }
      rule {
        source_labels = ["__meta_kubernetes_node_name"]
        regex         = "(.+)"
        target_label  = "__metrics_path__"
        replacement   = "/api/v1/nodes/${1}/proxy/metrics/cadvisor"
      }
    }

    prometheus.scrape "cadvisor" {
      targets         = discovery.relabel.cadvisor.output
      job_name        = "integrations/kubernetes/cadvisor"
      scheme          = "https"
      scrape_interval = "60s"
      bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
      tls_config {
        ca_file              = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
        insecure_skip_verify = false
      }
      forward_to = [prometheus.relabel.drop_high_cardinality.receiver]
    }

    // --- ArgoCD metrics services (job labels match the standard dashboard) ---
    discovery.kubernetes "services" {
      role = "service"
      namespaces {
        names = ["argocd"]
      }
    }

    discovery.relabel "argocd_metrics" {
      targets = discovery.kubernetes.services.targets

      rule {
        source_labels = ["__meta_kubernetes_service_name"]
        regex         = "argocd-(application-controller|server|repo-server|applicationset-controller)-metrics"
        action        = "keep"
      }
      rule {
        source_labels = ["__meta_kubernetes_service_name"]
        target_label  = "job"
      }
      rule {
        source_labels = ["__meta_kubernetes_namespace"]
        target_label  = "namespace"
      }
    }

    prometheus.scrape "argocd" {
      targets         = discovery.relabel.argocd_metrics.output
      scrape_interval = "30s"
      forward_to      = [prometheus.remote_write.grafana_cloud.receiver]
    }

    // --- Scrape pods with prometheus.io annotations ---
    discovery.relabel "pod_annotations" {
      targets = discovery.kubernetes.pods.targets

      rule {
        source_labels = ["__meta_kubernetes_pod_annotation_prometheus_io_scrape"]
        regex         = "true"
        action        = "keep"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_annotation_prometheus_io_scheme"]
        action        = "replace"
        target_label  = "__scheme__"
        regex         = "(https?)"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_annotation_prometheus_io_path"]
        action        = "replace"
        target_label  = "__metrics_path__"
        regex         = "(.+)"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_annotation_prometheus_io_port", "__meta_kubernetes_pod_ip"]
        action        = "replace"
        regex         = "(\\d+);(([0-9a-fA-F]*:?)+)"
        target_label  = "__address__"
        replacement   = "[$2]:$1"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_annotation_prometheus_io_port", "__meta_kubernetes_pod_ip"]
        action        = "replace"
        regex         = "(\\d+);((\\d+?\\.?)+)"
        target_label  = "__address__"
        replacement   = "$2:$1"
      }
      rule {
        source_labels = ["__meta_kubernetes_namespace"]
        target_label  = "namespace"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_name"]
        target_label  = "pod"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_container_name"]
        target_label  = "container"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
        regex         = "(.+)"
        target_label  = "job"
      }
      // Set instance to node name for node-exporter
      rule {
        source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name", "__meta_kubernetes_pod_node_name"]
        regex         = "prometheus-node-exporter;(.+)"
        target_label  = "instance"
        replacement   = "$1"
      }
      // Remap job names to match Grafana Cloud integration expectations
      rule {
        source_labels = ["job"]
        regex         = "prometheus-node-exporter"
        target_label  = "job"
        replacement   = "integrations/node_exporter"
      }
    }

    prometheus.scrape "pod_annotations" {
      targets         = discovery.relabel.pod_annotations.output
      scrape_interval = "60s"
      forward_to      = [prometheus.relabel.drop_high_cardinality.receiver]
    }

    // --- Drop high-cardinality metrics to stay within free tier ---
    prometheus.relabel "drop_high_cardinality" {
      rule {
        source_labels = ["__name__"]
        regex         = "(.+_bucket|etcd_.+|apiserver_request_duration.+|apiserver_response_sizes.+|grpc_server_.+)"
        action        = "drop"
      }
      forward_to = [prometheus.remote_write.grafana_cloud.receiver]
    }

    prometheus.remote_write "grafana_cloud" {
      external_labels = {
        cluster = "homelab",
      }
      endpoint {
        url = nonsensitive(remote.kubernetes.secret.grafana_cloud.data["METRICS_URL"])
        basic_auth {
          username = nonsensitive(remote.kubernetes.secret.grafana_cloud.data["METRICS_USERNAME"])
          password = remote.kubernetes.secret.grafana_cloud.data["API_KEY"]
        }
      }
    }

    // ============================================================
    // Logs: collect from all pods + Kubernetes events
    // ============================================================

    discovery.relabel "pod_logs" {
      targets = discovery.kubernetes.pods.targets

      rule {
        source_labels = ["__meta_kubernetes_namespace"]
        target_label  = "namespace"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_name"]
        target_label  = "pod"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_container_name"]
        target_label  = "container"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_node_name"]
        target_label  = "node"
      }
    }

    loki.source.kubernetes "pods" {
      targets    = discovery.relabel.pod_logs.output
      forward_to = [loki.process.pod_logs.receiver]
    }

    loki.process "pod_logs" {
      stage.static_labels {
        values = {
          cluster = "homelab",
        }
      }
      forward_to = [loki.write.grafana_cloud.receiver]
    }

    loki.source.kubernetes_events "cluster_events" {
      namespaces = []
      forward_to = [loki.write.grafana_cloud.receiver]
    }

    loki.write "grafana_cloud" {
      endpoint {
        url = nonsensitive(remote.kubernetes.secret.grafana_cloud.data["LOGS_URL"])
        basic_auth {
          username = nonsensitive(remote.kubernetes.secret.grafana_cloud.data["LOGS_USERNAME"])
          password = remote.kubernetes.secret.grafana_cloud.data["API_KEY"]
        }
      }
    }
