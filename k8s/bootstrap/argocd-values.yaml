# ArgoCD Helm values — configures the git repository and envsubst CMP sidecar.
# DOMAIN and EMAIL are injected at sync time from the homelab-config Secret;
# they are never stored in git.
# The SSH private key is passed via --set-file at install time; not in git.

configs:
  cm:
    dex.config: |
      connectors:
        - type: github
          id: github
          name: GitHub
          config:
            clientID: $dex.github.clientID
            clientSecret: $dex.github.clientSecret
            redirectURI: https://argocd.${DOMAIN}/api/dex/callback
  rbac:
    policy.csv: |
      g, Mahagon, role:admin
  repositories:
    homelab:
      type: git
      # url and sshPrivateKey are passed via --set/--set-file during helm install
server:
  ingress:
    enabled: true
    ingressClassName: traefik
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
    tls: true
    # hostname is passed via --set global.domain during helm install
repoServer:
  volumes:
    - name: cmp-envsubst-config
      configMap:
        name: argocd-cmp-envsubst
    - name: cmp-envsubst-apps-config
      configMap:
        name: argocd-cmp-envsubst-apps
  extraContainers:
    - name: cmp-envsubst
      # Use the ArgoCD image — it ships envsubst. Pin this to match your ArgoCD version.
      image: quay.io/argoproj/argocd:latest
      command: [/var/run/argocd/argocd-cmp-server]
      env:
        - name: DOMAIN
          valueFrom:
            secretKeyRef:
              name: homelab-config
              key: domain
        - name: EMAIL
          valueFrom:
            secretKeyRef:
              name: homelab-config
              key: email
      volumeMounts:
        - mountPath: /var/run/argocd
          name: var-files
        - mountPath: /home/argocd/cmp-server/plugins
          name: plugins
        - mountPath: /tmp
          name: tmp
        - mountPath: /home/argocd/cmp-server/config/plugin.yaml
          subPath: plugin.yaml
          name: cmp-envsubst-config
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
    - name: cmp-envsubst-apps
      image: quay.io/argoproj/argocd:latest
      command: [/var/run/argocd/argocd-cmp-server]
      env:
        - name: DOMAIN
          valueFrom:
            secretKeyRef:
              name: homelab-config
              key: domain
        - name: EMAIL
          valueFrom:
            secretKeyRef:
              name: homelab-config
              key: email
      volumeMounts:
        - mountPath: /var/run/argocd
          name: var-files
        - mountPath: /home/argocd/cmp-server/plugins
          name: plugins
        - mountPath: /tmp
          name: tmp
        - mountPath: /home/argocd/cmp-server/config/plugin.yaml
          subPath: plugin.yaml
          name: cmp-envsubst-apps-config
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
