# ArgoCD Helm values for initial bootstrap install only.
# After bootstrap, ArgoCD manages itself via k8s/apps/argocd/application.yaml.
# DOMAIN and EMAIL are injected via sed at install time.
# Repo credentials are created as a standalone labeled Secret.

configs:
  cm:
    dex.config: |
      connectors:
        - type: github
          id: github
          name: GitHub
          config:
            clientID: $dex.github.clientID
            clientSecret: $dex.github.clientSecret
            redirectURI: https://argocd.${DOMAIN}/api/dex/callback
  rbac:
    policy.csv: |
      g, ${EMAIL}, role:admin
    scopes: "[groups, email]"
  params:
    server.insecure: true
notifications:
  enabled: false
server:
  ingress:
    enabled: false
  certificate:
    enabled: true
    issuer:
      kind: ClusterIssuer
      name: letsencrypt-prod
repoServer:
  volumes:
    - name: cmp-envsubst-config
      configMap:
        name: argocd-cmp-envsubst
    - name: cmp-envsubst-apps-config
      configMap:
        name: argocd-cmp-envsubst-apps
  extraContainers:
    - name: cmp-envsubst
      image: quay.io/argoproj/argocd:latest
      command: [/var/run/argocd/argocd-cmp-server]
      env:
        - name: DOMAIN
          valueFrom:
            secretKeyRef:
              name: homelab-config
              key: domain
        - name: EMAIL
          valueFrom:
            secretKeyRef:
              name: homelab-config
              key: email
      volumeMounts:
        - mountPath: /var/run/argocd
          name: var-files
        - mountPath: /home/argocd/cmp-server/plugins
          name: plugins
        - mountPath: /tmp
          name: tmp
        - mountPath: /home/argocd/cmp-server/config/plugin.yaml
          subPath: plugin.yaml
          name: cmp-envsubst-config
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
    - name: cmp-envsubst-apps
      image: quay.io/argoproj/argocd:latest
      command: [/var/run/argocd/argocd-cmp-server]
      env:
        - name: DOMAIN
          valueFrom:
            secretKeyRef:
              name: homelab-config
              key: domain
        - name: EMAIL
          valueFrom:
            secretKeyRef:
              name: homelab-config
              key: email
      volumeMounts:
        - mountPath: /var/run/argocd
          name: var-files
        - mountPath: /home/argocd/cmp-server/plugins
          name: plugins
        - mountPath: /tmp
          name: tmp
        - mountPath: /home/argocd/cmp-server/config/plugin.yaml
          subPath: plugin.yaml
          name: cmp-envsubst-apps-config
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
